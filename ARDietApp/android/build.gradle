// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 26
        // compileSdk 34 for react-native-health-connect@3.5.3 (connect-client
        // 1.1.0-alpha11 needs >= 34; 3.x supports Android 14+ BUILT-IN Health Connect,
        // required for this Android 15 device). API 34 avoids API 35's sparse resource
        // encoding that AGP 7.4.2's aapt2 can't parse. targetSdk kept at 33.
        compileSdkVersion = 34
        targetSdkVersion = 33

        // We use NDK 23 which has both M1 support and is the side-by-side NDK version from AGP.
        ndkVersion = "23.1.7779620"

        kotlinVersion = "1.8.22"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

// Force EVERY Android module (libraries like react-native-image-picker default to
// compileSdk 35) onto compileSdk 34 + build-tools 34.0.0. AGP 7.4.2's aapt2 can't parse
// API 35's sparse resources (RES_TABLE_TYPE_TYPE overlap) — which breaks the release-only
// :verifyReleaseResources task (debug skips it, which is why debug built fine).
subprojects { subproject ->
    afterEvaluate {
        if (subproject.plugins.hasPlugin('com.android.library') || subproject.plugins.hasPlugin('com.android.application')) {
            subproject.android {
                compileSdkVersion 34
                buildToolsVersion '34.0.0'
            }
        }
    }
}

allprojects {
    configurations.all {
        resolutionStrategy {
            // Pin androidx libs to versions that work with compileSdk 33 / AGP 7.4.2
            force 'androidx.core:core:1.10.1'
            force 'androidx.core:core-ktx:1.10.1'
            force 'androidx.appcompat:appcompat:1.6.1'
            force 'androidx.appcompat:appcompat-resources:1.6.1'
            force 'androidx.activity:activity:1.7.2'
            force 'androidx.activity:activity-ktx:1.7.2'
            force 'androidx.fragment:fragment:1.6.1'
            force 'androidx.lifecycle:lifecycle-runtime:2.6.2'
            force 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'
            force 'androidx.lifecycle:lifecycle-viewmodel:2.6.2'
            force 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.6.2'
            force 'androidx.lifecycle:lifecycle-livedata-core:2.6.2'
            force 'androidx.lifecycle:lifecycle-process:2.6.2'
            force 'androidx.savedstate:savedstate:1.2.1'
            force 'androidx.annotation:annotation-experimental:1.3.1'
            force 'androidx.profileinstaller:profileinstaller:1.3.1'
        }
    }
}
